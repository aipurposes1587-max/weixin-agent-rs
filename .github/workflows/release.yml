name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: wechat-agent

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Create release notes body
        run: |
          cat > RELEASE_BODY.md << 'EOF'
          ## wechat-agent

          Cross-platform WeChat iLink CLI with pluggable agents.

          ### Key Features
          - QR login and multi-account support
          - Long-polling message loop with resume cursor
          - Agent backends: Claude/Codex/OpenClaw ACP, OpenAI, Anthropic
          - Inbound/outbound logs and fallback reply behavior

          ### Quick Start
          ```bash
          wechat-agent --login --agent codex
          wechat-agent --agent claude --account <account_id>
          ```

          ### Package List
          - macOS Intel DMG
          - macOS Apple Silicon DMG
          - Ubuntu 22.04/24.04 DEB (amd64)
          - Ubuntu 24.04 DEB (arm64)
          - Linux portable tar.gz (gnu/musl, x86_64/arm64)
          - Windows EXE (+ ZIP)
          EOF

      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          generate_release_notes: true

  linux-deb:
    needs: [prepare-release]
    name: linux-deb (${{ matrix.distro }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            distro: ubuntu22.04
            arch: amd64
          - runner: ubuntu-24.04
            distro: ubuntu24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            distro: ubuntu24.04
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build binary
        run: cargo build --release --bin ${{ env.BIN_NAME }}

      - name: Build deb package
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          cargo deb --no-build --output "dist/${{ env.BIN_NAME }}_${VERSION}_${{ matrix.distro }}_${{ matrix.arch }}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.distro }}-${{ matrix.arch }}-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Publish deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.deb
          fail_on_unmatched_files: true

  linux-portable:
    needs: [prepare-release]
    name: linux-portable (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            pkg: linux-gnu-x86_64
          - target: aarch64-unknown-linux-gnu
            pkg: linux-gnu-arm64
          - target: x86_64-unknown-linux-musl
            pkg: linux-musl-x86_64
          - target: aarch64-unknown-linux-musl
            pkg: linux-musl-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with cross
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --bin ${{ env.BIN_NAME }}"
          strip: true

      - name: Package tarball
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_BASE="${BIN_NAME}-${VERSION}-${{ matrix.pkg }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${PKG_BASE}"
          chmod +x "dist/${PKG_BASE}"
          tar -C dist -czf "dist/${PKG_BASE}.tar.gz" "${PKG_BASE}"
          sha256sum "dist/${PKG_BASE}.tar.gz" > "dist/${PKG_BASE}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}-tarball
          path: dist/*
          if-no-files-found: error

      - name: Publish portable package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true

  windows-exe:
    needs: [prepare-release]
    name: windows-exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Windows binary
        run: cargo build --release --bin $env:BIN_NAME

      - name: Package exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          Copy-Item "target/release/${env:BIN_NAME}.exe" "dist/${env:BIN_NAME}-$version-windows-x86_64.exe"
          Compress-Archive -Path "dist/${env:BIN_NAME}-$version-windows-x86_64.exe" -DestinationPath "dist/${env:BIN_NAME}-$version-windows-x86_64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*
          if-no-files-found: error

      - name: Publish windows package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true

  macos-dmg:
    needs: [prepare-release]
    name: macos-dmg (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-14
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build macOS binary
        run: cargo build --release --bin ${{ env.BIN_NAME }}

      - name: Create DMG
        run: |
          set -euo pipefail
          mkdir -p dist/stage
          VERSION="${GITHUB_REF_NAME#v}"
          cp "target/release/${BIN_NAME}" "dist/stage/${BIN_NAME}"
          chmod +x "dist/stage/${BIN_NAME}"
          cp README.md dist/stage/README.md
          hdiutil create \
            -volname "wechat-agent" \
            -srcfolder dist/stage \
            -ov \
            -format UDZO \
            "dist/${BIN_NAME}-${VERSION}-macos-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish dmg to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.dmg
          fail_on_unmatched_files: true
